<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>filehandling</title>
</head>
<body>
    <form action="">
       <label for="full name">Enter Full Name:</label>
         <input type="text"id="full name"placeholder="Enter the name required">
            <br><br>
            <label for="password">Enter Password:</label>
            <input type="password" id="password" placeholder="Enter the password required">
                <br><br>
                <label for="email">Enter Email:</label>
                <input type="email" id="email" placeholder="Enter the email">
                <br><br>
                <label for="tel">Enter Phone Number:</label>
                <input type="number" maxlength=10 id="tel" placeholder="Enter the phone number">
                <br><br>
                <label for="time">Enter Time:</label>
                <input type="time" id="time" placeholder="Enter the time">
                <br><br>
                <label for="date">Enter Date:</label>       
                <input type="date" id="date" placeholder="Enter the date">
                <br><br>
                <label for="color">Enter Color:</label>
                <input type="color" id="color" placeholder="Enter the color">
                <br><br>
                <label for="search">Enter Search:</label>
                <input type="search" id="search" placeholder="Enter the search">
                <br><br>
                <label for="number">Enter Number:</label>       
                <input type="number" id="number" placeholder="Enter the number">
                <br><br>    
                <label for="checkbox">Check the checkbox:</label>
                <input type="checkbox" id="checkbox">
                <br><br>
                <label for="range">Enter Range:</label>
                <input type="range"  placeholder="Enter the range">
                <br><br>
                <label for="file">Enter File:</label>
                <input type="file" id="file" placeholder="Enter the file">
                <br><br>
                <label for="file">File Information:</label>
                <input type="text" id="fileinfo" placeholder="Enter file information">
                <br><br>
                <label for="url">URL link:</label>
                <input type="url" id="url" placeholder="Enter the URL">
                <br><br>
                <label for="month">Enter Month:</label>
                <input type="month" id="month" placeholder="Enter the month">
                <br><br>
                <label for="number">Enter Number:</label>
                <input type="number" id="number" placeholder="Enter the number">
                <br><br>
                <input type="submit">
                <br><br>
                <input type="reset">
                <br><br>
                <textarea name="paragraph" id="paragraph">feedback</textarea>
               
                
                <select required>  
                <option value=""selected disabled >Select your favorite sport</option>
                <option value="Cricket">Cricket</option>
                <option value="Football">Football</option>
                <option value="Basketball">Basketball</option>
                <option value="Tennis">Tennis</option>
                <option value="Hockey">Hockey</option>
                 </select>

    </form>
    
</body>
</html>
