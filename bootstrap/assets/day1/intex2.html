<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Level 2 UI</title>

  <!-- Bootstrap CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }

    .hero {
      background: linear-gradient(to right, #0d6efd, #6610f2);
      color: white;
      padding: 80px 0;
    }

    .card {
      overflow: hidden;
    }

    .card img {
      transition: 0.4s;
    }

    .card:hover img {
      transform: scale(1.1);
    }

    .badge-custom {
      position: absolute;
      top: 10px;
      right: 10px;
    }

    .category-box {
      transition: 0.3s;
      cursor: pointer;
    }

    .category-box:hover {
      transform: translateY(-5px);
      background: #0d6efd;
      color: white;
    }

    footer {
      background: #212529;
      color: white;
    }
  </style>
</head>

<body>

<!-- 🔥 NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="#">MachaShop</a>

    <!-- Search -->
    <form class="d-flex w-50">
      <input class="form-control me-2" type="search" placeholder="Search products...">
      <button class="btn btn-primary">Search</button>
    </form>
  </div>
</nav>

<!-- 🔥 HERO -->
<section class="hero text-center">
  <div class="container">
    <h1 class="fw-bold">Big Sale 🔥</h1>
    <p>Up to 50% OFF on all products</p>
    <button class="btn btn-light">Shop Now</button>
  </div>
</section>

<!-- 🔥 CATEGORIES -->
<div class="container my-5">
  <div class="row text-center g-4">

    <div class="col-md-3">
      <div class="p-4 bg-white shadow category-box">Mobiles</div>
    </div>

    <div class="col-md-3">
      <div class="p-4 bg-white shadow category-box">Laptops</div>
    </div>

    <div class="col-md-3">
      <div class="p-4 bg-white shadow category-box">Shoes</div>
    </div>

    <div class="col-md-3">
      <div class="p-4 bg-white shadow category-box">Watches</div>
    </div>

  </div>
</div>

<!-- 🔥 PRODUCTS -->
<div class="container mb-5">
  <h2 class="mb-4">Featured Products</h2>

  <div class="row g-4">

    <!-- Card -->
    <div class="col-md-4">
      <div class="card shadow position-relative">

        <span class="badge bg-danger badge-custom">New</span>

        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5>Smart Phone</h5>
          <p>Latest model with best features</p>
          <button class="btn btn-primary w-100">Buy Now</button>
        </div>

      </div>
    </div>

    <!-- Card -->
    <div class="col-md-4">
      <div class="card shadow position-relative">

        <span class="badge bg-success badge-custom">Sale</span>

        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5>Laptop</h5>
          <p>High performance laptop</p>
          <button class="btn btn-success w-100">Buy Now</button>
        </div>

      </div>
    </div>

    <!-- Card -->
    <div class="col-md-4">
      <div class="card shadow position-relative">

        <span class="badge bg-warning text-dark badge-custom">Hot</span>

        <img src="https://via.placeholder.com/300" class="card-img-top">

        <div class="card-body">
          <h5>Smart Watch</h5>
          <p>Track your fitness easily</p>
          <button class="btn btn-warning w-100">Buy Now</button>
        </div>

      </div>
    </div>

  </div>
</div>

<!-- 🔥 FOOTER -->
<footer class="text-center p-4">
  <p>© 2026 MachaShop | Designed by You 😎</p>
</footer>

</body>
</html>
